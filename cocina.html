<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabriel Cocina</title>

<link rel="stylesheet" href="css/styles.css">

<style>

body{
    background:#111;
    color:white;
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
}

header{
    padding:20px;
    border-bottom:1px solid #333;
}

#estado{
    color:#7fe28b;
    margin-top:8px;
}

#cocina{

    padding:20px;

    display:grid;

    gap:20px;

    grid-template-columns:repeat(auto-fill,minmax(330px,1fr));

}

.tarjeta{

    background:#222;

    border-radius:10px;

    border-left:8px solid #d63031;

    padding:20px;

    animation:aparece .25s;

}

.tarjeta.preparando{

    border-left-color:#f1c40f;

}

.tarjeta.listo{

    border-left-color:#2ecc71;

}

.tarjeta h2{

    margin:0 0 10px;

}

pre{

    white-space:pre-wrap;

    font-family:inherit;

    margin:10px 0;

}

hr{

    border:none;

    border-top:1px solid #444;

    margin:12px 0;

}

@keyframes aparece{

from{

opacity:0;
transform:translateY(10px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<header>

<h1>🍕 Cocina</h1>

<div id="estado">Conectando...</div>

</header>

<div id="cocina"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

db.collection("pedidos")
.onSnapshot((snapshot)=>{

    document.getElementById("estado").textContent=
    "Pedidos activos: "+snapshot.size;

    const cocina=document.getElementById("cocina");

    cocina.innerHTML="";

    const pedidos=[];

    snapshot.forEach(doc=>{

        pedidos.push(doc.data());

    });

    pedidos.sort((a,b)=>a.id-b.id);

    pedidos.forEach(p=>{

        if(p.estado==="Entregado")
            return;

        const card=document.createElement("div");

        let clase="";

        if(p.estado==="Preparando")
            clase="preparando";

        if(p.estado==="Listo")
            clase="listo";

        card.className="tarjeta "+clase;

        card.innerHTML=`

            <h2>👤 ${p.cliente}</h2>

            <strong>${p.estado}</strong>

            <hr>

            <pre>${p.pedido}</pre>

            <hr>

            <div>📍 ${p.direccion}</div>

            <div>💳 ${p.pago}</div>

            <div>📝 ${p.observaciones||""}</div>

        `;

        cocina.appendChild(card);

    });

},console.error);

</script>

</body>

</html>
