<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocina</title>

<link rel="stylesheet" href="css/styles.css">

<style>
body{
    background:#111;
    color:white;
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
}

h1{
    padding:20px;
}

#estado{
    padding:0 20px 20px;
    color:#8fd18f;
}

#cocina{
    padding:20px;
    display:grid;
    gap:20px;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
}

.tarjeta{
    background:#222;
    border-left:8px solid #28a745;
    border-radius:10px;
    padding:20px;
}

pre{
    white-space:pre-wrap;
}
</style>

</head>

<body>

<h1>🍕 Cocina</h1>

<div id="estado">Conectando...</div>

<div id="cocina"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script>

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

document.getElementById("estado").textContent="Conectado a Firebase";

db.collection("pedidos").get()
.then((snapshot)=>{

    document.getElementById("estado").textContent=
        "Pedidos encontrados: "+snapshot.size;

    const cocina=document.getElementById("cocina");

    snapshot.forEach((doc)=>{

        const p=doc.data();

        const tarjeta=document.createElement("div");

        tarjeta.className="tarjeta";

        tarjeta.innerHTML=`
            <h2>${p.cliente}</h2>
            <p>${p.estado}</p>
            <pre>${p.pedido}</pre>
        `;

        cocina.appendChild(tarjeta);

    });

})
.catch((e)=>{

    document.getElementById("estado").textContent=e.message;

    console.error(e);

});

</script>

</body>
</html>
